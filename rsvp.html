<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Taylor & Connor | R.S.V.P.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Corinthia&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="rsvp-body">
  <header class="site-header">
    <nav class="nav" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="registry-list/index.html">Registry</a>
      <a href="rsvp.html" aria-current="page">RSVP</a>
      <a href="faq.html">FAQs</a>
    </nav>
  </header>

  <main class="rsvp-main">
    <div class="section__inner section__inner--narrow rsvp-page">
      <h1 class="section__title rsvp-page__title">R.S.V.P.</h1>

      <div id="rsvp-lookup" class="rsvp-panel">
        <p class="rsvp-intro">Enter your name as shown on your invitation — first name, last name, or both.</p>
        <form id="form-find" class="rsvp-form">
          <label class="rsvp-field">
            <span class="rsvp-field__label">Name</span>
            <input id="guest-name" class="rsvp-input" type="text" autocomplete="name" placeholder="First name, last name, or full name" required />
          </label>
          <button type="submit" class="rsvp-btn">Find invitation</button>
        </form>
      </div>

      <div id="rsvp-choose" class="rsvp-panel" hidden>
        <p class="rsvp-intro">We found more than one match. Please select your invitation:</p>
        <ul id="guest-choices" class="rsvp-choices"></ul>
        <button type="button" id="btn-back-lookup" class="rsvp-btn rsvp-btn--secondary">Search again</button>
      </div>

      <div id="rsvp-party" class="rsvp-panel" hidden>
        <h2 id="party-title" class="rsvp-party-title"></h2>
        <form id="form-rsvp" class="rsvp-form rsvp-form--party">
          <div id="guest-fields"></div>
          <div class="rsvp-actions">
            <button type="submit" class="rsvp-btn">Submit R.S.V.P.</button>
            <button type="button" id="btn-reset-party" class="rsvp-btn rsvp-btn--secondary">Look up a different invitation</button>
          </div>
        </form>
      </div>

      <p id="rsvp-message" class="rsvp-message" role="status" aria-live="polite"></p>
    </div>
  </main>

  <footer class="site-footer">
    <p class="footer__names">Taylor Carlson &amp; Connor Fornoff</p>
    <p class="footer__date"><time datetime="2026-10-21">October 21, 2026</time></p>
  </footer>

  <script type="module" src="js/rsvp-app.js"></script>
</body>
</html>
